apiVersion: designate.openstack.org/v1beta1
kind: Designate
metadata:
  name: designate
spec:
  designate:
    template:
      designateBackendbind9:
        addressPool: internalapi
        replicas: 2
        service:
          ports:
            - name: named-tcp
              port: 53
              protocol: TCP
              targetPort: 53
            - name: named-udp
              port: 53
              protocol: UDP
              targetPort: 53
