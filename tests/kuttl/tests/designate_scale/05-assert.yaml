#
# Check for:
#
# - Designate CR with all services scaled down to 0 replicas
# - Designate Deployment with no pods
#

apiVersion: designate.openstack.org/v1beta1
kind: Designate
metadata:
  finalizers:
  - openstack.org/designate
  name: designate
spec:
  designateAPI:
    replicas: 0
  designateBackendbind9:
    replicas: 0
  designateCentral:
    replicas: 0
  designateMdns:
    replicas: 0
  designateProducer:
    replicas: 0
  designateUnbound:
    replicas: 0
  designateWorker:
    replicas: 0
status:
  designateAPIReadyCount: 0
  designateBackendbind9ReadyCount: 0
  designateCentralReadyCount: 0
  designateMdnsReadyCount: 0
  designateProducerReadyCount: 0
  designateUnboundReadyCount: 0
  designateWorkerReadyCount: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-api
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-backendbind9
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-central
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-mdns
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-producer
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-unbound
spec:
  replicas: 0
status:
  availableReplicas: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: designate-worker
spec:
  replicas: 0
status:
  availableReplicas: 0
